name: Android Release

# Builds a debug APK and publishes it as a GitHub Release so anyone
# can download the app directly from
#   https://github.com/Bsraccc1/daily-quran/releases
#
# Two ways to trigger:
#   1. Push a semver tag like `v3.0.1`:
#        git tag v3.0.1
#        git push origin v3.0.1
#      The tag name becomes the release name and version.
#
#   2. Manually from the Actions tab → "Android Release" → "Run
#      workflow" → enter a version (e.g. `v3.0.1`). A tag is
#      created at HEAD of the selected branch and a release is
#      published.
#
# The APK is renamed `daily-quran-<version>-debug.apk` so users can
# tell what version they're downloading at a glance.

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v3.0.1) — must start with v"
        required: true
        type: string

# `contents: write` is required by softprops/action-gh-release to
# create the Release and upload assets via the auto-injected
# GITHUB_TOKEN. No PAT needed.
permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build & publish release APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Configure Gradle cache
        uses: gradle/actions/setup-gradle@v3

      # Resolve the version string from either the pushed tag or
      # the manual dispatch input. We strip the `refs/tags/` prefix
      # so $version is always something like `v3.0.1`.
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            VERSION="${{ inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          if [[ ! "$VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+ ]]; then
            echo "::error::Version must look like v1.2.3 (got: $VERSION)"
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Resolved version: $VERSION"

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Rename APK with version
        id: apk
        shell: bash
        run: |
          SRC="app/build/outputs/apk/debug/app-debug.apk"
          DEST="daily-quran-${{ steps.version.outputs.version }}-debug.apk"
          cp "$SRC" "$DEST"
          ls -la "$DEST"
          echo "path=$DEST" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: Daily Quran ${{ steps.version.outputs.version }}
          # Auto-builds the changelog from PRs / commits since the
          # previous tag using GitHub's release-notes generator.
          generate_release_notes: true
          files: ${{ steps.apk.outputs.path }}
          fail_on_unmatched_files: true
          draft: false
          prerelease: false
