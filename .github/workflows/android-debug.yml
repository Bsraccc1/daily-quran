name: Android Debug Build

# Builds a debug APK on every push and pull request, plus on manual
# dispatch from the Actions tab. The compiled APK is uploaded as a
# workflow artifact so collaborators can grab it without setting up a
# local Android toolchain.
#
# Toolchain pinned to:
#   - JDK 17 (matches `app/build.gradle.kts` jvmTarget)
#   - Gradle 8.2 (resolved by the wrapper)
#   - AGP 8.2.0, Kotlin 1.9.23, KSP 1.9.23-1.0.20

on:
  push:
    branches: ["**"]
    paths-ignore:
      - "**.md"
      - "docs/**"
      - ".gitignore"
      - "LICENSE"
  pull_request:
    branches: [main]
  workflow_dispatch:

# Stale runs on the same ref are cancelled when a new commit lands so
# we don't burn CI minutes on outdated builds.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-debug:
    name: Assemble debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      # `setup-gradle` configures the Gradle build cache and remote
      # cache (read-only on PRs) and wires up dependency reporting.
      - name: Configure Gradle cache
        uses: gradle/actions/setup-gradle@v3

      - name: Make gradlew executable
        run: chmod +x ./gradlew

      - name: Assemble debug APK
        run: ./gradlew :app:assembleDebug --no-daemon --stacktrace

      - name: Run unit tests
        run: ./gradlew :app:testDebugUnitTest --no-daemon --stacktrace

      - name: Run Android lint
        run: ./gradlew :app:lintDebug --no-daemon --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/*.apk
          if-no-files-found: error
          retention-days: 14

      - name: Upload lint report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lint-report-${{ github.sha }}
          path: |
            app/build/reports/lint-results-*.html
            app/build/reports/lint-results-*.xml
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload unit test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: |
            app/build/reports/tests/
            app/build/test-results/
          if-no-files-found: ignore
          retention-days: 7
